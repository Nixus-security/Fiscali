services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fiscali
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fiscali
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  pgdata:
